services:
  # Infrastructure
  postgres:
    image: postgres:16
    container_name: recsys-postgres
    environment:
      POSTGRES_USER: recsys
      POSTGRES_PASSWORD: recsys
      POSTGRES_DB: recsys
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recsys"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - recsys-net

  redis:
    image: redis:7
    container_name: recsys-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - recsys-net

  kafka:
    image: apache/kafka:3.7.0
    container_name: recsys-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - recsys-net

  # Application Services
  ingestion:
    build:
      context: .
      target: ingestion
    container_name: recsys-ingestion
    ports:
      - "8001:8001"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_FORMAT: json
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - recsys-net

  consumer:
    build:
      context: .
      target: consumer
    container_name: recsys-consumer
    ports:
      - "8003:8003"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql+asyncpg://recsys:recsys@postgres:5432/recsys
      REDIS_URL: redis://redis:6379/0
      CONSUMER_METRICS_PORT: "8003"
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - recsys-net

  recommendation:
    build:
      context: .
      target: recommendation
    container_name: recsys-recommendation
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://recsys:recsys@postgres:5432/recsys
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - recsys-net

  # DB Migrations (run once)
  migrate:
    build:
      context: .
      target: ingestion
    container_name: recsys-migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://recsys:recsys@postgres:5432/recsys
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - recsys-net

  # Observability
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: recsys-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - recsys-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: recsys-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - recsys-net

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  recsys-net:
    driver: bridge
