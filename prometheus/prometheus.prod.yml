global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ingestion-service"
    metrics_path: /metrics/
    static_configs:
      - targets: ["ingestion:8001"]

  - job_name: "recommendation-api"
    metrics_path: /metrics/
    static_configs:
      - targets: ["recommendation:8002"]

  - job_name: "consumer-service"
    metrics_path: /metrics/
    static_configs:
      - targets: ["consumer:8003"]
